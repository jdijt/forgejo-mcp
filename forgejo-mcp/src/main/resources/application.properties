# --- Forgejo upstream ---
# Base URL of the Forgejo instance this MCP server fronts.
forgejo.base-url=${FORGEJO_BASE_URL:https://forgejo.example.com}
# OAuth app registered on Forgejo (Settings -> Applications -> Manage OAuth2).
forgejo.oauth.client-id=${FORGEJO_OAUTH_CLIENT_ID:please-configure}
forgejo.oauth.client-secret=${FORGEJO_OAUTH_CLIENT_SECRET:please-configure}

# --- Broker upstream (generic OAuth provider seam, here wired to Forgejo) ---
# The broker drives a standard OAuth2 authorization-code flow against these endpoints.
broker.upstream.authorize-url=${forgejo.base-url}/login/oauth/authorize
broker.upstream.token-url=${forgejo.base-url}/login/oauth/access_token
broker.upstream.client-id=${forgejo.oauth.client-id}
broker.upstream.client-secret=${forgejo.oauth.client-secret}
broker.upstream.scopes=read:repository,read:issue,read:user

# --- Broker (this server, acting as AS to Claude) ---
# Public URL where this MCP server is reachable. Used to build OAuth metadata
# and the redirect URI registered on Forgejo. No trailing slash.
broker.public-base-url=${BROKER_PUBLIC_BASE_URL:http://localhost:8080}
# base64url-encoded 32-byte AES key. Generate: `openssl rand -base64 32`.
broker.token-encryption-key=${BROKER_TOKEN_ENCRYPTION_KEY:please-configure}
# broker.pending-auth-ttl=PT10M
# broker.access-token-ttl=PT1H
# broker.auth-code-ttl=PT60S
# broker.refresh-token-ttl=P30D
# broker.cimd.allowed-hosts=claude.ai,claude.com
# broker.cimd.fetch-timeout=PT10S

# --- Forgejo REST client (user-info resolution + repo tools) ---
quarkus.rest-client.forgejo-api.url=${forgejo.base-url}

# --- Logging ---
# Root and app levels are env-overridable. WARN flags operational problems (upstream failures);
# INFO records lifecycle events (authentication, token issuance, startup topology). Set
# APP_LOG_LEVEL=DEBUG for OAuth-flow detail (bearer/grant rejections, upstream calls) — it adds
# nothing at INFO.
quarkus.log.level=${LOG_LEVEL:INFO}
quarkus.log.category."eu.derfniw".level=${APP_LOG_LEVEL:INFO}

# --- Container image: harbor.gw.derfniw-dev.net/homeinfra/forgejo-mcp:<version> ---
# Built with podman via quarkus-container-image-podman. Tag defaults to the project
# version. Build:  ./mvnw package -Dquarkus.container-image.build=true -pl forgejo-mcp
# Build + push:    add -Dquarkus.container-image.push=true (run `podman login` first).
quarkus.container-image.registry=harbor.gw.derfniw-dev.net
quarkus.container-image.group=homeinfra
quarkus.container-image.name=forgejo-mcp

# --- MCP path is bearer-protected; everything else is public ---
quarkus.http.auth.permission.mcp.paths=/mcp,/mcp/*
quarkus.http.auth.permission.mcp.policy=authenticated

# Broker tokens (mcp_ac_/mcp_rt_) are posted to /token as form attributes and embed
# the upstream Forgejo JWTs, so they exceed the 2048-byte default form-attribute cap.
quarkus.http.limits.max-form-attribute-size=16K

# --- Test profile overrides ---
# ForgejoTestResource overrides forgejo.base-url + forgejo.oauth.* at container
# startup; the broker.upstream.* / rest-client URLs above interpolate from them.
%test.broker.public-base-url=http://localhost:8081
# 32 bytes of "mcp-broker-test-key-do-not-use-i" base64url-encoded. Test-only.
%test.broker.token-encryption-key=bWNwLWJyb2tlci10ZXN0LWtleS1kby1ub3QtdXNlLWk
%dev.broker.token-encryption-key=bWNwLWJyb2tlci10ZXN0LWtleS1kby1ub3QtdXNlLWk
