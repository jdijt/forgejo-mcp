# --- Forgejo upstream ---
# Base URL of the Forgejo instance this MCP server fronts.
forgejo.base-url=${FORGEJO_BASE_URL:https://forgejo.example.com}
# OAuth app registered on Forgejo (Settings -> Applications -> Manage OAuth2).
forgejo.oauth.client-id=${FORGEJO_OAUTH_CLIENT_ID:please-configure}
forgejo.oauth.client-secret=${FORGEJO_OAUTH_CLIENT_SECRET:please-configure}
# forgejo.oauth.scopes=read:repository,read:issue,read:user
# --- Broker (this server, acting as AS to Claude) ---
# Public URL where this MCP server is reachable. Used to build OAuth metadata
# and the redirect URI registered on Forgejo. No trailing slash.
broker.public-base-url=${BROKER_PUBLIC_BASE_URL:http://localhost:8080}
# base64url-encoded 32-byte AES key. Generate: `openssl rand -base64 32`.
broker.token-encryption-key=${BROKER_TOKEN_ENCRYPTION_KEY:please-configure}
# broker.pending-auth-ttl=PT10M
# broker.access-token-ttl=PT1H
# broker.auth-code-ttl=PT60S
# broker.refresh-token-ttl=P30D
# broker.cimd.allowed-hosts=claude.ai,claude.com
# broker.cimd.fetch-timeout=PT10S
# --- Forgejo REST clients ---
quarkus.rest-client.forgejo-oauth.url=${forgejo.base-url}
# --- Test profile overrides ---
%test.forgejo.base-url=https://forgejo.test
%test.forgejo.oauth.client-id=test-client-id
%test.forgejo.oauth.client-secret=test-client-secret
%test.broker.public-base-url=http://localhost:8081
# 32 bytes of "mcp-broker-test-key-do-not-use-i" base64url-encoded. Test-only.
%test.broker.token-encryption-key=bWNwLWJyb2tlci10ZXN0LWtleS1kby1ub3QtdXNlLWk
%dev.broker.token-encryption-key=bWNwLWJyb2tlci10ZXN0LWtleS1kby1ub3QtdXNlLWk
