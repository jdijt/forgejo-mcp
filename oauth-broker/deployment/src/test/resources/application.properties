# Integration tests for the generic OAuth broker extension. No real upstream is
# contacted here (the Forgejo-coupled end-to-end tests live in the app module);
# the upstream settings below are dummy values that exercise the broker's
# config-driven authorize/metadata behaviour.

# --- Broker (acting as AS to the downstream client) ---
broker.public-base-url=http://localhost:8081
# 32 bytes of "mcp-broker-test-key-do-not-use-i" base64url-encoded. Test-only.
broker.token-encryption-key=bWNwLWJyb2tlci10ZXN0LWtleS1kby1ub3QtdXNlLWk

# --- Upstream OAuth 2.0 provider (dummy; not contacted) ---
broker.upstream.authorize-url=https://upstream.test/login/oauth/authorize
broker.upstream.token-url=https://upstream.test/login/oauth/access_token
broker.upstream.client-id=test-client-id
broker.upstream.client-secret=test-client-secret
broker.upstream.scopes=read:repository,read:issue,read:user

# --- MCP path is bearer-protected; everything else is public ---
quarkus.http.auth.permission.mcp.paths=/mcp,/mcp/*
quarkus.http.auth.permission.mcp.policy=authenticated
